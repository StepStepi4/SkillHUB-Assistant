<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Портал Навчання SkillHUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00a046;
            --primary-light: #e6f6ec;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --border: #e5e5ea;
            --danger: #ef4444;
        }

        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 480px;
            background: var(--card-bg);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
        }

        /* Екрани */
        .screen { display: none; padding: 24px 20px; animation: fadeIn 0.3s ease; flex: 1; }
        .screen.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Заголовки */
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { font-size: 22px; font-weight: 800; margin: 0 0 8px 0; line-height: 1.2;}
        .header p { font-size: 14px; color: var(--text-muted); margin: 0; }

        /* Форми та інпути */
        .input-group { margin-bottom: 16px; width: 100%; }
        input {
            width: 100%; padding: 16px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg);
            font-size: 16px; font-family: inherit; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

        .btn {
            width: 100%; padding: 16px; border-radius: 12px;
            font-size: 16px; font-weight: 700; border: none; cursor: pointer;
            transition: 0.2s; text-align: center;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:active { background: var(--primary-light); }

        /* Списки (продукти та сервіси) */
        .list-item {
            padding: 16px; border: 1px solid var(--border); border-radius: 16px;
            margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
            transition: 0.2s; background: var(--card-bg);
        }
        .list-item:active { background: var(--bg); transform: scale(0.98); }
        .list-item-title { font-size: 16px; font-weight: 600; }
        
        /* Відображення матеріалу */
        .material-content {
            background: var(--card-bg); border-radius: 16px;
            border: 1px solid var(--border); padding: 0 16px; margin-bottom: 24px;
        }
        .mat-line {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px 0; border-bottom: 1px solid var(--border);
        }
        .mat-line:last-child { border-bottom: none; }
        .mat-emoji { font-size: 40px; margin-bottom: 8px; }
        .mat-text { font-size: 15px; color: var(--text-main); line-height: 1.5; font-weight: 500;}

        /* Прогрес бар тесту */
        .progress-wrapper { position: relative; width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin: 10px 0 30px 0; }
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s ease; }
        .progress-dot {
            position: absolute; top: 50%; width: 16px; height: 16px; background: var(--primary);
            border-radius: 50%; transform: translate(-50%, -50%); transition: left 0.3s ease;
            box-shadow: 0 2px 6px rgba(0, 160, 70, 0.4); border: 2px solid white;
        }

        /* Опції тесту */
        .test-question { font-size: 18px; font-weight: 700; margin-bottom: 20px; line-height: 1.4; text-align: center;}
        .test-option {
            padding: 16px; border: 2px solid var(--border); border-radius: 12px;
            margin-bottom: 12px; cursor: pointer; font-size: 15px; font-weight: 500;
            display: flex; gap: 12px; align-items: center; transition: 0.2s;
        }
        .test-option.selected { border-color: var(--primary); background: var(--primary-light); }
        .opt-letter { font-weight: 800; color: var(--text-muted); width: 24px; }
        .test-option.selected .opt-letter { color: var(--primary); }

        /* Лоадер */
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card-bg); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Навігація назад */
        .back-nav {
            display: flex; align-items: center; gap: 8px; color: var(--text-muted);
            font-weight: 600; font-size: 14px; margin-bottom: 20px; cursor: pointer;
        }
        .back-nav svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2.5; fill: none; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- Екран завантаження -->
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div style="font-weight: 600; color: var(--text-muted);" id="loader-text">Підключення до бази...</div>
    </div>

    <!-- Екран 1: Логін -->
    <div id="screen-login" class="screen">
        <div class="header" style="margin-top: 40px;">
            <h1>SkillHUB Навчання</h1>
            <p>Введіть логін і пароль для входу до порталу навчання</p>
        </div>
        <div class="input-group">
            <input type="text" id="loginInput" placeholder="Логін">
        </div>
        <div class="input-group">
            <input type="password" id="passInput" placeholder="Пароль">
        </div>
        <p id="loginError" style="color: var(--danger); font-size: 13px; font-weight: 600; text-align: center; display: none; margin-top: 0;"></p>
        <button class="btn btn-primary" onclick="handleLogin()" style="margin-top: 10px;">Увійти</button>
    </div>

    <!-- Екран 2: Вибір продукту -->
    <div id="screen-products" class="screen">
        <div class="header" style="text-align: left;">
            <h1>Оберіть продукт</h1>
            <p>Доступні напрямки для навчання</p>
        </div>
        <div id="products-list"></div>
    </div>

    <!-- Екран 3: Вибір сервісу -->
    <div id="screen-services" class="screen">
        <div class="back-nav" onclick="showScreen('screen-products')">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg> Назад до продуктів
        </div>
        <div class="header" style="text-align: left;">
            <h1 id="selected-product-title">Назва продукту</h1>
            <p>Оберіть сервіс для вивчення</p>
        </div>
        <div id="services-list"></div>
    </div>

    <!-- Екран 4: Матеріал -->
    <div id="screen-material" class="screen" style="padding-bottom: 100px;">
        <div class="back-nav" onclick="showScreen('screen-services')">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg> Назад
        </div>
        <div class="header">
            <h1 id="mat-title" style="font-size: 20px;">Назва сервісу</h1>
        </div>
        <div class="material-content" id="mat-content">
            <!-- Згенерований контент -->
        </div>
        <!-- Зафіксована кнопка внизу екрану -->
        <div style="position: fixed; bottom: 0; left: 0; width: 100%; padding: 16px; background: var(--card-bg); border-top: 1px solid var(--border); display: flex; justify-content: center; z-index: 10;">
            <div style="width: 100%; max-width: 440px;">
                <button class="btn btn-primary" onclick="startTest()">ПРОЙТИ ТЕСТ</button>
            </div>
        </div>
    </div>

    <!-- Екран 5: Тест -->
    <div id="screen-test" class="screen">
        <div class="header">
            <h1 style="font-size: 18px;">Тестування</h1>
        </div>
        <div class="progress-wrapper">
            <div class="progress-fill" id="test-progress"></div>
            <div class="progress-dot" id="test-dot"></div>
        </div>
        
        <div id="question-container" style="flex: 1;">
            <div class="test-question" id="test-q-text">Запитання?</div>
            <div id="test-options"></div>
        </div>
        
        <button class="btn btn-primary" id="btn-next-question" onclick="submitAnswer()" style="margin-top: 20px;" disabled>Відповісти</button>
    </div>

    <!-- Екран 6: Результат -->
    <div id="screen-result" class="screen" style="justify-content: center; align-items: center; text-align: center;">
        <div id="result-emoji" style="font-size: 60px; margin-bottom: 20px;">🎯</div>
        <h1 id="result-title" style="margin: 0 0 10px 0;">Результат</h1>
        <p id="result-desc" style="color: var(--text-muted); font-size: 15px; margin-bottom: 30px; line-height: 1.5;"></p>
        
        <div style="width: 100%; display: flex; flex-direction: column; gap: 12px;">
            <button class="btn btn-primary" id="btn-result-action" onclick="finishTestFlow()">Продовжити</button>
        </div>
    </div>

</div>

<script>
    // Глобальний стан
    let db = null;
    let currentUser = null;
    let currentMaterials = [];
    let currentServiceObj = null;
    
    // Стан тесту
    let testData = {
        questions: [],
        currentIndex: 0,
        score: 0,
        attempts: 1 // Початкова спроба сесії
    };

    // Запуск при старті
    window.onload = function() {
        // Викликаємо функцію з Code.gs
        google.script.run
            .withSuccessHandler(onDatabaseLoaded)
            .withFailureHandler(onDatabaseError)
            .getDatabase();
    };

    function onDatabaseLoaded(data) {
        db = data.educationData;
        document.getElementById('loader').style.display = 'none';
        showScreen('screen-login');
    }

    function onDatabaseError(err) {
        document.getElementById('loader-text').innerHTML = "Помилка завантаження.<br>" + err.message;
        document.querySelector('.spinner').style.display = 'none';
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        window.scrollTo(0, 0);
    }

    // --- 1. АВТОРИЗАЦІЯ ---
    function handleLogin() {
        const login = document.getElementById('loginInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        const errEl = document.getElementById('loginError');

        if(!login || !pass) {
            errEl.innerText = "Будь ласка, заповніть всі поля";
            errEl.style.display = 'block';
            return;
        }

        const user = db.users.find(u => u.login === login && u.pass === pass);
        if (user) {
            currentUser = user.login;
            errEl.style.display = 'none';
            renderProducts();
        } else {
            errEl.innerText = "Невірний логін або пароль";
            errEl.style.display = 'block';
        }
    }

    // --- 2. ВИБІР ПРОДУКТУ ---
    function renderProducts() {
        const listEl = document.getElementById('products-list');
        // Отримуємо унікальні продукти
        const products = [...new Set(db.materials.map(m => m.product))];
        
        let html = products.map(prod => `
            <div class="list-item" onclick="renderServices('${escapeHtml(prod)}')">
                <span class="list-item-title">📦 ${escapeHtml(prod)}</span>
                <span style="color: var(--text-muted);">❯</span>
            </div>
        `).join('');
        
        listEl.innerHTML = html;
        showScreen('screen-products');
    }

    // --- 3. ВИБІР СЕРВІСУ ---
    function renderServices(productName) {
        document.getElementById('selected-product-title').innerText = productName;
        const listEl = document.getElementById('services-list');
        
        // Фільтруємо по продукту і сортуємо по пріоритету (від меншого до більшого)
        currentMaterials = db.materials
            .filter(m => m.product === productName)
            .sort((a, b) => a.priority - b.priority);

        let html = currentMaterials.map((mat, idx) => `
            <div class="list-item" onclick="openMaterial(${idx})">
                <span class="list-item-title">📄 ${escapeHtml(mat.serviceName)}</span>
                <span style="color: var(--text-muted);">❯</span>
            </div>
        `).join('');
        
        listEl.innerHTML = html;
        showScreen('screen-services');
    }

    // --- 4. МАТЕРІАЛ ---
    function openMaterial(idx) {
        currentServiceObj = currentMaterials[idx];
        document.getElementById('mat-title').innerText = currentServiceObj.serviceName;
        
        const contentEl = document.getElementById('mat-content');
        
        // Парсинг опису (збільшення емодзі та центрування)
        let lines = currentServiceObj.description.split('\n');
        let html = '';
        
        // Регулярний вираз для пошуку емодзі на початку рядка
        const emojiRegex = /^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)(.*)/u;

        lines.forEach(line => {
            line = line.trim();
            if(!line) return;
            
            let match = line.match(emojiRegex);
            if (match) {
                html += `
                <div class="mat-line">
                    <span class="mat-emoji">${match[1]}</span>
                    <span class="mat-text">${escapeHtml(match[2].trim())}</span>
                </div>`;
            } else {
                html += `
                <div class="mat-line">
                    <span class="mat-text">${escapeHtml(line)}</span>
                </div>`;
            }
        });
        
        contentEl.innerHTML = html;
        showScreen('screen-material');
    }

    // --- 5. ЛОГІКА ТЕСТУВАННЯ ---
    function parseTestRaw(rawText) {
        let lines = rawText.split('\n').map(l => l.trim()).filter(l => l);
        let questions = [];
        let currQ = null;

        // Шукаємо паттерн відповіді: "a) текст", "1/a) текст", "b) текст"
        const answerRegex = /^(?:\d+\/)?([a-zа-яA-ZА-Я]\))\s*(.*)/;

        lines.forEach(line => {
            let ansMatch = line.match(answerRegex);
            if (ansMatch) {
                if (currQ) {
                    let letter = ansMatch[1];
                    let text = ansMatch[2];
                    let isCorrect = text.includes('(+)');
                    text = text.replace('(+)', '').trim(); // Прибираємо маркер
                    currQ.options.push({ letter, text, isCorrect, selected: false });
                }
            } else {
                // Це питання. Прибираємо цифри з крапкою на початку "1. ", "2. "
                let qText = line.replace(/^\d+\.\s*/, '').trim();
                currQ = { text: qText, options: [] };
                questions.push(currQ);
            }
        });
        return questions;
    }

    function startTest() {
        testData.questions = parseTestRaw(currentServiceObj.testRaw);
        if (testData.questions.length === 0) {
            alert("Тест для цього сервісу ще не додано.");
            return;
        }
        testData.currentIndex = 0;
        testData.score = 0;
        renderQuestion();
        showScreen('screen-test');
    }

    function renderQuestion() {
        let q = testData.questions[testData.currentIndex];
        document.getElementById('test-q-text').innerText = q.text;
        
        // Малюємо прогрес
        let progressPercent = (testData.currentIndex / testData.questions.length) * 100;
        document.getElementById('test-progress').style.width = progressPercent + '%';
        document.getElementById('test-dot').style.left = progressPercent + '%';

        let optionsHtml = q.options.map((opt, idx) => `
            <div class="test-option" id="opt-${idx}" onclick="toggleOption(${idx})">
                <span class="opt-letter">${opt.letter}</span>
                <span style="flex:1;">${escapeHtml(opt.text)}</span>
            </div>
        `).join('');
        
        document.getElementById('test-options').innerHTML = optionsHtml;
        document.getElementById('btn-next-question').disabled = true; // Блокуємо кнопку, поки не обрано варіант
    }

    function toggleOption(optIdx) {
        let q = testData.questions[testData.currentIndex];
        q.options[optIdx].selected = !q.options[optIdx].selected;
        
        let el = document.getElementById(`opt-${optIdx}`);
        if (q.options[optIdx].selected) {
            el.classList.add('selected');
        } else {
            el.classList.remove('selected');
        }

        // Вмикаємо кнопку, якщо обрано хоча б 1 варіант
        let hasSelection = q.options.some(o => o.selected);
        document.getElementById('btn-next-question').disabled = !hasSelection;
    }

    function submitAnswer() {
        let q = testData.questions[testData.currentIndex];
        
        // Логіка перевірки множинної відповіді:
        // Користувач повинен обрати ВСІ правильні та НЕ обрати ЖОДНОГО неправильного.
        let isFullyCorrect = true;
        q.options.forEach(opt => {
            if (opt.isCorrect && !opt.selected) isFullyCorrect = false;
            if (!opt.isCorrect && opt.selected) isFullyCorrect = false;
        });

        if (isFullyCorrect) testData.score++;

        testData.currentIndex++;
        
        if (testData.currentIndex < testData.questions.length) {
            renderQuestion();
        } else {
            // Останнє питання - дотягуємо прогрес бар до 100%
            document.getElementById('test-progress').style.width = '100%';
            document.getElementById('test-dot').style.left = '100%';
            setTimeout(showResults, 400); // Невелика затримка для анімації бару
        }
    }

    // --- 6. РЕЗУЛЬТАТИ ТА ЗБЕРЕЖЕННЯ ---
    function showResults() {
        let total = testData.questions.length;
        let percent = Math.round((testData.score / total) * 100);
        
        const titleEl = document.getElementById('result-title');
        const descEl = document.getElementById('result-desc');
        const emojiEl = document.getElementById('result-emoji');
        const btnAction = document.getElementById('btn-result-action');

        // Показуємо екран, але блокуємо кнопку, поки йде збереження
        showScreen('screen-result');
        btnAction.disabled = true;
        btnAction.innerText = "Збереження результату...";

        if (percent >= 80) {
            emojiEl.innerText = "🏆";
            titleEl.innerText = "Вітаємо!";
            titleEl.style.color = "var(--primary)";
            descEl.innerHTML = `Ви пройшли тест на <b>${percent}%</b> (${testData.score} з ${total}).<br>Результат успішно записано!`;
            btnAction.classList.replace('btn-outline', 'btn-primary');
            btnAction.innerText = "Повернутись до сервісів";
            btnAction.onclick = () => {
                testData.attempts = 1; // скидаємо спроби для наступних тестів
                showScreen('screen-services');
            };
        } else {
            emojiEl.innerText = "📖";
            titleEl.innerText = "Спробуйте ще раз";
            titleEl.style.color = "var(--danger)";
            descEl.innerHTML = `Ваш результат: <b>${percent}%</b>.<br>Для проходження потрібно мінімум 80%. Будь ласка, перечитайте матеріал та спробуйте знову.`;
            btnAction.classList.replace('btn-primary', 'btn-outline');
            btnAction.innerText = "Перечитати матеріал";
            btnAction.onclick = () => {
                testData.attempts++; // збільшуємо лічильник спроб
                showScreen('screen-material');
            };
        }

        // ВІДПРАВКА НА БЕКЕНД
        google.script.run
            .withSuccessHandler((response) => {
                // Розблоковуємо кнопку після успішного збереження
                btnAction.disabled = false;
                if(percent >= 80) btnAction.innerText = "Опрацювати наступний сервіс";
                else btnAction.innerText = "Перечитати матеріал";
            })
            .withFailureHandler((err) => {
                alert("Помилка збереження результату: " + err.message);
                btnAction.disabled = false;
                btnAction.innerText = "Продовжити (Не збережено)";
            })
            .saveEducationScore(currentUser, currentServiceObj.serviceName, percent, testData.attempts);
    }

    // Допоміжна функція
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
</script>
</body>
</html>
